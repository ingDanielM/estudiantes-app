<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<form class="login-container" id="otpForm" style="transform: translateY(170px); transition: all 0.3s ease;"">
    <h1>Iniciar sesión</h1>

    <input type="email" id="email" placeholder="Correo">
    <button type="submit">Enviar código</button>
</form>
<form class="login-container" id="verifyForm" style="opacity: 0; transform: translateY(-170px); pointer-events: none; transition: all 0.3s ease;">
    <h1>Verificar OTP</h1>

    <input type="text" id="otp" placeholder="Código OTP">
    <button type="submit">Ingresar</button>
</form>

<div id="toast" class="toast"></div>

<script src="login.js"></script>

</body>
</html>
