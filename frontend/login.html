<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>

<h2>Login con OTP</h2>

<form id="otpForm">
  <input type="email" id="email" placeholder="Correo" required>
  <button type="submit">Enviar OTP</button>
</form>

<br>

<form id="verifyForm">
  <input type="text" id="otp" placeholder="Código OTP" required>
  <button type="submit">Verificar OTP</button>
</form>

<script src="login.js"></script>
</body>
</html>
