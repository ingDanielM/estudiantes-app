<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estudiantes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>🎓 Gestión de Estudiantes</h1>

    <div class="card">
        <h2>Agregar</h2>
        <input type="text" id="name" placeholder="Nombre">
        <input type="number" id="age" placeholder="Edad">
        <input type="number" step="0.1" id="grade" placeholder="Nota">
        <button onclick="agregar()">Agregar</button>
    </div>

    <div class="card">
        <h2>Lista</h2>
        <ul id="lista"></ul>
    </div>

    <button onclick="logout()" class="logout">Cerrar sesión</button>
</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
